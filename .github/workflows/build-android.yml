name: Build Android APKs

on:
  push:
    branches: [main]
    paths:
      - 'feriwala_customer/**'
      - 'feriwala_shop/**'
      - 'feriwala_delivery/**'
  workflow_dispatch:

jobs:
  build-customer-app:
    name: Customer App APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable

      - name: Regenerate Android project
        working-directory: feriwala_customer
        run: |
          rm -rf android
          flutter create --platforms android .
          # Fix applicationId (flutter create uses com.example by default)
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's|applicationId = "com.example.feriwala_customer"|applicationId = "com.feriwala.customer"|' android/app/build.gradle.kts
            sed -i 's|namespace = "com.example.feriwala_customer"|namespace = "com.feriwala.customer"|' android/app/build.gradle.kts
          elif grep -q 'applicationId' android/app/build.gradle; then
            sed -i 's|applicationId "com.example.feriwala_customer"|applicationId "com.feriwala.customer"|' android/app/build.gradle
            sed -i 's|namespace "com.example.feriwala_customer"|namespace "com.feriwala.customer"|' android/app/build.gradle
          fi
          # Add location permissions
          sed -i 's|<uses-permission android:name="android.permission.INTERNET"/>|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>|' android/app/src/main/AndroidManifest.xml
          # Add Google Maps API key
          sed -i 's|</application>|    <meta-data android:name="com.google.android.geo.API_KEY" android:value="AIzaSyDKijqkofbXiD1WOkPmW-6CQFEpRuLHCJ4"/>\n    </application>|' android/app/src/main/AndroidManifest.xml
          # Upgrade Kotlin version to be compatible with Flutter plugins (require >= 1.9.0)
          find android -name 'settings.gradle' -exec sed -i 's/kotlin.android" version "[^"]*"/kotlin.android" version "1.9.25"/g' {} \;
          find android -name 'settings.gradle.kts' -exec sed -i 's/kotlin.android") version "[^"]*"/kotlin.android") version "1.9.25"/g' {} \;

      - name: Get dependencies
        working-directory: feriwala_customer
        run: flutter pub get

      - name: Build APK
        working-directory: feriwala_customer
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: mv feriwala_customer/build/app/outputs/flutter-apk/app-release.apk feriwala_customer/build/app/outputs/flutter-apk/feriwala-customer-${{ github.run_number }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: feriwala-customer-apk
          path: feriwala_customer/build/app/outputs/flutter-apk/feriwala-customer-*.apk
          retention-days: 30

  build-shop-app:
    name: Shop App APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable

      - name: Regenerate Android project
        working-directory: feriwala_shop
        run: |
          rm -rf android
          flutter create --platforms android .
          # Fix applicationId
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's|applicationId = "com.example.feriwala_shop"|applicationId = "com.feriwala.shop"|' android/app/build.gradle.kts
            sed -i 's|namespace = "com.example.feriwala_shop"|namespace = "com.feriwala.shop"|' android/app/build.gradle.kts
          elif grep -q 'applicationId' android/app/build.gradle; then
            sed -i 's|applicationId "com.example.feriwala_shop"|applicationId "com.feriwala.shop"|' android/app/build.gradle
            sed -i 's|namespace "com.example.feriwala_shop"|namespace "com.feriwala.shop"|' android/app/build.gradle
          fi
          # Add location permissions
          sed -i 's|<uses-permission android:name="android.permission.INTERNET"/>|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>|' android/app/src/main/AndroidManifest.xml
          # Upgrade Kotlin version
          find android -name 'settings.gradle' -exec sed -i 's/kotlin.android" version "[^"]*"/kotlin.android" version "1.9.25"/g' {} \;
          find android -name 'settings.gradle.kts' -exec sed -i 's/kotlin.android") version "[^"]*"/kotlin.android") version "1.9.25"/g' {} \;

      - name: Get dependencies
        working-directory: feriwala_shop
        run: flutter pub get

      - name: Build APK
        working-directory: feriwala_shop
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: mv feriwala_shop/build/app/outputs/flutter-apk/app-release.apk feriwala_shop/build/app/outputs/flutter-apk/feriwala-shop-${{ github.run_number }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: feriwala-shop-apk
          path: feriwala_shop/build/app/outputs/flutter-apk/feriwala-shop-*.apk
          retention-days: 30

  build-delivery-app:
    name: Delivery App APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable

      - name: Regenerate Android project
        working-directory: feriwala_delivery
        run: |
          rm -rf android
          flutter create --platforms android .
          # Fix applicationId
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's|applicationId = "com.example.feriwala_delivery"|applicationId = "com.feriwala.delivery"|' android/app/build.gradle.kts
            sed -i 's|namespace = "com.example.feriwala_delivery"|namespace = "com.feriwala.delivery"|' android/app/build.gradle.kts
          elif grep -q 'applicationId' android/app/build.gradle; then
            sed -i 's|applicationId "com.example.feriwala_delivery"|applicationId "com.feriwala.delivery"|' android/app/build.gradle
            sed -i 's|namespace "com.example.feriwala_delivery"|namespace "com.feriwala.delivery"|' android/app/build.gradle
          fi
          # Add location permissions (delivery)
          sed -i 's|<uses-permission android:name="android.permission.INTERNET"/>|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>|' android/app/src/main/AndroidManifest.xml
          # Upgrade Kotlin version
          find android -name 'settings.gradle' -exec sed -i 's/kotlin.android" version "[^"]*"/kotlin.android" version "1.9.25"/g' {} \;
          find android -name 'settings.gradle.kts' -exec sed -i 's/kotlin.android") version "[^"]*"/kotlin.android") version "1.9.25"/g' {} \;

      - name: Get dependencies
        working-directory: feriwala_delivery
        run: flutter pub get

      - name: Build APK
        working-directory: feriwala_delivery
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: mv feriwala_delivery/build/app/outputs/flutter-apk/app-release.apk feriwala_delivery/build/app/outputs/flutter-apk/feriwala-delivery-${{ github.run_number }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: feriwala-delivery-apk
          path: feriwala_delivery/build/app/outputs/flutter-apk/feriwala-delivery-*.apk
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-customer-app, build-shop-app, build-delivery-app]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          path: apks/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Feriwala v1.0.${{ github.run_number }}"
          body: |
            ## Feriwala Android Apps - Build ${{ github.run_number }}

            ### Download APKs:
            - **feriwala-customer** — Customer shopping app
            - **feriwala-shop** — Shop/outlet management app
            - **feriwala-delivery** — Delivery agent app
          files: apks/**/*.apk
          draft: false
          prerelease: false
